<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Only on Stake — Preroll</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #000;
    width: 100vw;
    height: 100vh;
  }

  .preroll {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    cursor: pointer;
  }

  /* ── Safety gradient behind everything ── */
  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #00A0FA 0%, #18ade8 30%, #2cb8e4 50%, #38c2e2 70%, #00C8E5 100%);
    z-index: 0;
  }

  /* ── Black cover that reveals via clip ── */
  .black-cover {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 1;
    animation: coverFade 0.8s ease 1.6s forwards;
  }
  @keyframes coverFade {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── Blob layers ── */
  .blob {
    position: absolute;
    /* Center at bottom-right corner of viewport */
    width: 320vmax;
    height: 320vmax;
    right: -160vmax;
    bottom: -160vmax;
    transform-origin: center;
    will-change: transform;
    border-radius: 42% 58% 55% 45% / 48% 42% 58% 52%;
    z-index: 2;
  }

  .blob--1 {
    background: linear-gradient(140deg, #10b8e8 0%, #08a0da 40%, #0090cc 100%);
    border: 2px solid rgba(255,255,255,0.15);
    animation: blobGrow 2.2s cubic-bezier(0.25, 0.85, 0.25, 1) 0.1s both;
  }
  .blob--2 {
    background: linear-gradient(140deg, #18bee8 0%, #0ea6dc 40%, #0696ce 100%);
    border: 2px solid rgba(255,255,255,0.2);
    width: 300vmax; height: 300vmax;
    right: -150vmax; bottom: -150vmax;
    border-radius: 44% 56% 52% 48% / 46% 44% 56% 54%;
    animation: blobGrow 2.2s cubic-bezier(0.25, 0.85, 0.25, 1) 0.2s both;
  }
  .blob--3 {
    background: linear-gradient(140deg, #20c2ea 0%, #14acde 40%, #0a9cd0 100%);
    border: 2px solid rgba(255,255,255,0.22);
    width: 280vmax; height: 280vmax;
    right: -140vmax; bottom: -140vmax;
    border-radius: 46% 54% 50% 50% / 44% 46% 54% 56%;
    animation: blobGrow 2.2s cubic-bezier(0.25, 0.85, 0.25, 1) 0.3s both;
  }
  .blob--4 {
    background: linear-gradient(140deg, #28c6ec 0%, #1ab0e0 40%, #0ea2d2 100%);
    border: 2px solid rgba(255,255,255,0.25);
    width: 260vmax; height: 260vmax;
    right: -130vmax; bottom: -130vmax;
    border-radius: 48% 52% 47% 53% / 42% 48% 52% 58%;
    animation: blobGrow 2.2s cubic-bezier(0.25, 0.85, 0.25, 1) 0.4s both;
  }
  .blob--5 {
    background: linear-gradient(140deg, #00C8E5 0%, #20b6e2 40%, #12a8d4 100%);
    border: 2px solid rgba(255,255,255,0.28);
    width: 240vmax; height: 240vmax;
    right: -120vmax; bottom: -120vmax;
    border-radius: 50% 50% 45% 55% / 40% 50% 50% 60%;
    animation: blobGrow 2.2s cubic-bezier(0.25, 0.85, 0.25, 1) 0.5s both;
  }

  @keyframes blobGrow {
    0% {
      transform: scale(0);
      opacity: 0;
    }
    3% {
      opacity: 1;
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  /* ── Text + Logo ── */
  .content {
    position: absolute;
    z-index: 20;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    white-space: nowrap;
    opacity: 0;
    animation:
      textIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards,
      textZoom 3s ease-out 1.2s forwards;
  }

  @keyframes textIn {
    0% {
      opacity: 0;
      transform: translate(-50%, -43%) scale(0.92);
    }
    100% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  }

  @keyframes textZoom {
    0% {
      transform: translate(-50%, -50%) scale(1);
    }
    100% {
      transform: translate(-50%, -50%) scale(1.06);
    }
  }

  .text {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(52px, 8.5vw, 130px);
    color: #fff;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .logo {
    height: clamp(56px, 9.5vw, 145px);
    fill: #fff;
    margin-left: 0.85em;
    transform: translateY(0.05em);
  }

  /* ── Replay ── */
  .preroll.replaying * {
    animation: none !important;
  }
  .preroll.replaying .black-cover { opacity: 1; }
  .preroll.replaying .blob { transform: scale(0); opacity: 0; }
  .preroll.replaying .content { opacity: 0; }
</style>
</head>
<body>

<div class="preroll" id="preroll">
  <div class="bg"></div>
  <div class="black-cover"></div>

  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>
  <div class="blob blob--4"></div>
  <div class="blob blob--5"></div>

  <div class="content">
    <span class="text">Only on</span>

      </g>
    </svg>
  </div>
</div>

<script>
  document.getElementById('preroll').addEventListener('click', () => {
    const el = document.getElementById('preroll');
    el.classList.add('replaying');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.classList.remove('replaying');
      });
    });
  });
</script>

</body>
</html>
